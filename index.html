<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sad Emoji Pond</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb; /* sky */
      font-family: Arial, sans-serif;
    }

    .pond {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60%;
      background: radial-gradient(circle at center, #5ec6e8, #2a8fb3);
      border-top-left-radius: 50% 20%;
      border-top-right-radius: 50% 20%;
      overflow: hidden;
    }

    .emoji {
      position: absolute;
      font-size: 50px;
      animation: swim 6s infinite alternate ease-in-out;
    }

    @keyframes swim {
      0% {
        left: 10%;
        top: 50%;
        transform: rotate(0deg);
      }
      25% {
        top: 60%;
      }
      50% {
        left: 70%;
        top: 40%;
        transform: rotate(10deg);
      }
      75% {
        top: 55%;
      }
      100% {
        left: 20%;
        top: 50%;
        transform: rotate(-10deg);
      }
    }

    .title {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 24px;
      color: white;
      text-shadow: 1px 1px 4px black;
    }
  </style>
</head>
<body>

  <div class="title">Sad Emoji Swimming 🥺💧</div>

  <div class="pond">
    <div class="emoji">🥺</div>
  </div>

</body>
</html>
